# Publishes the gh-pages branch to GitHub Pages via the Actions-native deployment
# (build_type: workflow), bypassing the legacy Jekyll pipeline entirely.
#
# Deploy (prod → gh-pages root) and PR preview (→ gh-pages/pr-preview/pr-N) keep
# writing to the gh-pages branch exactly as before; this workflow fires when either
# finishes and re-publishes the whole branch tree as the Pages site.
name: Publish Pages

on:
  workflow_run:
    workflows: [Deploy, PR preview]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write # sticky preview-status comment, posted once the deploy is actually live

# Queue rather than cancel: Deploy and PR preview finishing back-to-back (e.g. a
# PR merge) trigger two runs, and cancelling one mid-deploy shows up as a scary
# errored deployment. Runs are short; let them serialize.
concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # A PR merge fires Deploy and PR-preview cleanup back-to-back, queueing a second publish
      # behind this one. Racing two Pages deployments is what tips the Pages service into its
      # "Deployment failed, try again later" state (every observed failure window started at a
      # merge) — so if a newer publish is already queued, skip: it will ship the same final
      # gh-pages tree, and one deployment happens instead of two.
      - name: Skip if a newer publish is queued
        id: dedupe
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              ...context.repo, workflow_id: 'pages.yml', status: 'queued', per_page: 10,
            });
            const newer = data.workflow_runs.filter(r => r.id !== context.runId);
            core.setOutput('skip', newer.length > 0 ? 'true' : 'false');
            if (newer.length) core.info(`Skipping: ${newer.length} newer publish run(s) queued will ship the same tree.`);

      - name: Checkout gh-pages
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Drop git metadata
        if: steps.dedupe.outputs.skip != 'true'
        run: rm -rf .git

      - name: Upload Pages artifact
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # continue-on-error + explicit retry: the Pages service occasionally rejects a deployment
      # with a transient "Deployment failed, try again later". Retrying INSIDE the run is safe —
      # the artifact was uploaded once, so there's no "Multiple artifacts named github-pages"
      # trap (that only bites whole-workflow reruns, which double-upload).
      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.dedupe.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait out transient Pages error
        if: steps.dedupe.outputs.skip != 'true' && steps.deployment.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (retry)
        id: retry
        if: steps.dedupe.outputs.skip != 'true' && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # The preview link is only real once deploy-pages above has finished — that's why the
      # sticky PR comment is posted here, not from pr-preview.yml (which merely writes to the
      # gh-pages branch and completes ~30-60s before the site actually serves the new content).
      - name: Comment preview link on the PR
        if: >-
          steps.dedupe.outputs.skip != 'true' &&
          (steps.deployment.outcome == 'success' || steps.retry.outcome == 'success') &&
          github.event_name == 'workflow_run' && github.event.workflow_run.name == 'PR preview'
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let prNumber = run.pull_requests?.[0]?.number;
            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                ...context.repo, state: 'open', head: `${context.repo.owner}:${run.head_branch}`,
              });
              prNumber = prs[0]?.number;
            }
            if (!prNumber) { core.info('No PR found for this preview run; skipping comment.'); return; }
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });
            if (pr.state !== 'open') { core.info(`PR #${prNumber} is ${pr.state}; skipping comment.`); return; }
            const url = `https://${context.repo.owner.toLowerCase()}.github.io/${context.repo.repo}/pr-preview/pr-${prNumber}/`;
            const marker = '<!-- pr-preview-status -->';
            const body = marker + `\n✅ **PR preview is live:** ${url}\n\n` +
              `Built from ${run.head_sha.slice(0, 7)}, published just now.`;
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: prNumber });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });

      - name: Comment publish failure on the PR
        if: failure() && github.event_name == 'workflow_run' && github.event.workflow_run.name == 'PR preview'
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let prNumber = run.pull_requests?.[0]?.number;
            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                ...context.repo, state: 'open', head: `${context.repo.owner}:${run.head_branch}`,
              });
              prNumber = prs[0]?.number;
            }
            if (!prNumber) return;
            const marker = '<!-- pr-preview-status -->';
            const body = marker + '\n❌ **PR preview publish failed.**\n\n' +
              `The preview content was staged on gh-pages, but publishing it to Pages errored — see the [Publish Pages run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: prNumber });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });
