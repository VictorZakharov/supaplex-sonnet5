name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build

      # comment: false — this workflow only writes to the gh-pages branch; the preview isn't
      # actually live until the chained Publish Pages run finishes, so the "ready" comment is
      # posted from pages.yml after a successful deploy instead of prematurely from here.
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          comment: false

      - name: Comment (build/deploy failed)
        if: failure() && github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-status -->';
            const body = marker + '\n❌ **PR preview failed to build or deploy.**\n\n' +
              `See the [PR preview run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });

      - name: Comment (preview removed)
        if: success() && github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-status -->';
            const body = marker + '\n🗑️ **PR preview removed** — the PR is closed, so its preview folder was deleted.';
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
